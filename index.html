<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Sri Lanka - Watch TV Shows Online, Watch Movies Online</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background-color: #141414;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
        .netflix-bg {
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0.3) 50%, rgba(0, 0, 0, 0.9) 100%), 
                        url('https://assets.nflxext.com/ffe/siteui/vlv3/7ca5b7c9-ba3f-4c88-85ba-6e240a1493c8/43e0d4a6-40db-46e3-8af3-bc79fa033288/LK-en-20240325-popsignuptwoweeks-perspective_alpha_website_large.jpg');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="text-white select-none">

    <div class="netflix-bg h-[95vh] w-full flex flex-col justify-between px-6 md:px-24 py-6 relative">
        <div class="flex justify-between items-center z-10">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" alt="Netflix Logo" class="w-28 md:w-40">
            <button class="bg-[#E50914] text-white px-4 py-1.5 rounded font-medium text-sm cursor-pointer hover:bg-red-700 transition">Sign In</button>
        </div>

        <div class="flex flex-col items-center text-center justify-center my-auto z-10 max-w-3xl mx-auto">
            <h1 class="text-3xl md:text-5xl font-black mb-4">Unlimited movies, TV shows, and more</h1>
            <p class="text-lg md:text-2xl font-normal mb-6">Watch anywhere. Cancel anytime.</p>
            <p class="text-sm md:text-xl font-normal mb-4">Ready to watch? Enter your email to create or restart your membership.</p>
            
            <form onsubmit="validateSecureForm(event, this)" class="flex flex-col md:flex-row gap-3 w-full max-w-xl px-4">
                <input type="email" placeholder="Email address" required class="bg-black/50 border border-gray-500 rounded p-4 flex-grow text-white placeholder-gray-400 focus:outline-none focus:border-white">
                <button type="submit" class="bg-[#E50914] text-white text-xl font-semibold py-3 px-6 rounded flex items-center justify-center gap-2 hover:bg-red-700 transition cursor-pointer">
                    Get Started <span>&gt;</span>
                </button>
            </form>
        </div>
    </div>

    <div class="h-2 bg-[#232323] w-full"></div>

    <div class="bg-black py-16 px-6 md:px-24 text-center">
        <div class="max-w-3xl mx-auto mb-10">
            <p class="text-sm md:text-xl font-normal mb-4">Ready to watch? Enter your email to create or restart your membership.</p>
            
            <form onsubmit="validateSecureForm(event, this)" class="flex flex-col md:flex-row gap-3 w-full max-w-xl mx-auto px-4">
                <input type="email" placeholder="Email address" required class="bg-black/50 border border-gray-500 rounded p-4 flex-grow text-white placeholder-gray-400 focus:outline-none focus:border-white">
                <button type="submit" class="bg-[#E50914] text-white text-xl font-semibold py-3 px-6 rounded flex items-center justify-center gap-2 hover:bg-red-700 transition cursor-pointer">
                    Get Started <span>&gt;</span>
                </button>
            </form>
        </div>
        <p class="text-gray-500 text-sm">Netflix Clone - Created for Educational Purposes</p>
    </div>


    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ඔයාගේ Firebase Config එක (ස්ක්‍රීන්ෂොට් එකෙන් ගත්තේ)
        const firebaseConfig = {
            apiKey: "AIzaSyAG6fzjVWksXVawN58Y3co698", 
            authDomain: "nextflix-db-5c782.firebaseapp.com",
            projectId: "nextflix-db-5c782",
            storageBucket: "nextflix-db-5c782.appspot.com",
            messagingSenderId: "330584392048",
            appId: "1:330584392048:web:3cc8b46f46c1987ba138e6",
            measurementId: "G-B4ZCNDXTS5"
        };

        // Firebase Initialization
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Form එක සබ්මිට් වෙද්දී ක්‍රියාත්මක වන පොදු Function එක
        window.validateSecureForm = async function(event, formElement) {
            event.preventDefault();
            
            // ෆෝම් එක ඇතුළේ තියෙන Email එක ගන්නවා
            const emailInput = formElement.querySelector('input[type="email"]');
            const emailValue = emailInput.value;

            try {
                // Firebase Firestore එකට Data ඇතුළත් කිරීම
                await addDoc(collection(db, "registered_users"), {
                    email: emailValue,
                    timestamp: new Date()
                });
                
                alert("නියමයි! ඔයාගේ Email එක Firebase Database එකට සාර්ථකව සේව් වුණා! 🎉");
                emailInput.value = ""; // කොටුව හිස් කරනවා
            } catch (e) {
                alert("අවුලක් වුණා: " + e.message);
            }
        }
    </script>

</body>
</html>
